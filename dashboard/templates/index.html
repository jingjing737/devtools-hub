<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTools Hub 🚀</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; }
        header h1 { font-size: 3em; margin-bottom: 10px; }
        header p { color: #888; font-size: 1.2em; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .stat-card { background: #1a1a1a; border-radius: 12px; padding: 30px; text-align: center; }
        .stat-card .value { font-size: 2.5em; font-weight: bold; margin: 10px 0; }
        .stat-card.cpu .value { color: #00d4ff; }
        .stat-card.memory .value { color: #ff6b6b; }
        .stat-card.disk .value { color: #ffd93d; }
        .stat-card .label { color: #888; text-transform: uppercase; font-size: 0.9em; }
        .section { background: #1a1a1a; border-radius: 12px; padding: 30px; margin: 20px 0; }
        .section h2 { margin-bottom: 20px; color: #00d4ff; }
        .process-list { display: grid; gap: 10px; }
        .process { display: flex; justify-content: space-between; padding: 15px; background: #252525; border-radius: 8px; }
        .process .name { font-weight: bold; }
        .process .stats { font-size: 0.9em; color: #888; }
        .commands { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .command { background: #252525; padding: 20px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.3s; }
        .command:hover { background: #303030; transform: translateY(-3px); }
        .command code { background: #333; padding: 5px 10px; border-radius: 4px; display: block; margin-top: 10px; }
        footer { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 DevTools Hub</h1>
            <p>All-in-one developer toolkit / 全栈开发者工具箱</p>
        </header>
        
        <div class="stats">
            <div class="stat-card cpu">
                <div class="label">CPU Usage</div>
                <div class="value" id="cpu">--</div>
            </div>
            <div class="stat-card memory">
                <div class="label">Memory</div>
                <div class="value" id="memory">--</div>
            </div>
            <div class="stat-card disk">
                <div class="label">Disk</div>
                <div class="value" id="disk">--</div>
            </div>
        </div>
        
        <div class="section">
            <h2>⚡ Quick Commands</h2>
            <div class="commands">
                <div class="command">
                    <div>System Info</div>
                    <code>devtools sysinfo</code>
                </div>
                <div class="command">
                    <div>Process List</div>
                    <code>devtools ps</code>
                </div>
                <div class="command">
                    <div>Git Status</div>
                    <code>devtools git status</code>
                </div>
                <div class="command">
                    <div>File Find</div>
                    <code>devtools find .</code>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>📋 Running Processes</h2>
            <div class="process-list" id="processes">
                <div class="process"><span>Loading...</span></div>
            </div>
        </div>
        
        <footer>
            <p>DevTools Hub v1.0 | Built with ❤️</p>
        </footer>
    </div>
    
    <script>
        async function updateStats() {
            try {
                const res = await fetch('/api/sysinfo');
                const data = await res.json();
                document.getElementById('cpu').textContent = data.cpu + '%';
                document.getElementById('memory').textContent = data.memory + '%';
                document.getElementById('disk').textContent = data.disk + '%';
            } catch(e) { console.error(e); }
        }
        
        async function updateProcesses() {
            try {
                const res = await fetch('/api/processes');
                const procs = await res.json();
                const html = procs.map(p => `
                    <div class="process">
                        <span class="name">${p.name}</span>
                        <span class="stats">PID: ${p.pid} | CPU: ${p.cpu || 0}% | MEM: ${(p.memory || 0).toFixed(1)}%</span>
                    </div>
                `).join('');
                document.getElementById('processes').innerHTML = html || 'No processes';
            } catch(e) { console.error(e); }
        }
        
        updateStats();
        updateProcesses();
        setInterval(() => { updateStats(); updateProcesses(); }, 5000);
    </script>
</body>
</html>
