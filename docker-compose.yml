version: '3.8'

services:
  devtools-hub:
    build: .
    container_name: devtools-hub
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - /proc:/host/proc:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
